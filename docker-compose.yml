services:
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  searxng:
    image: ghcr.io/searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      FORCE_OWNERSHIP: "true"
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me}
      SEARXNG_VALKEY_URL: valkey://valkey:6379/0
    volumes:
      - ./searxng/core-config:/etc/searxng
      - searxng_cache:/var/cache/searxng
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; sock = socket.create_connection(('127.0.0.1', 8080), 5); sock.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  readability:
    build:
      context: ./readability_service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3010"
      MAX_BODY_BYTES: ${URL_READ_MAX_BYTES:-5242880}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3010/healthz',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mcp-web-search:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_healthy
      readability:
        condition: service_healthy
    environment:
      SEARXNG_BASE_URL: http://searxng:8080
      SEARXNG_REQUEST_TIMEOUT_SECONDS: ${SEARXNG_REQUEST_TIMEOUT_SECONDS:-15}
      SEARXNG_CONNECT_TIMEOUT_SECONDS: ${SEARXNG_CONNECT_TIMEOUT_SECONDS:-5}
      SEARXNG_REQUEST_RETRIES: ${SEARXNG_REQUEST_RETRIES:-1}
      MAX_RESULTS: ${MAX_RESULTS:-10}
      MAX_QUERY_LENGTH: ${MAX_QUERY_LENGTH:-512}
      MAX_PAGE_NUMBER: ${MAX_PAGE_NUMBER:-10}
      DEFAULT_SAFE_SEARCH: ${DEFAULT_SAFE_SEARCH:-1}
      URL_READ_TIMEOUT_SECONDS: ${URL_READ_TIMEOUT_SECONDS:-20}
      URL_READ_MAX_BYTES: ${URL_READ_MAX_BYTES:-5242880}
      URL_READ_MAX_CHARS: ${URL_READ_MAX_CHARS:-12000}
      READABILITY_SERVICE_URL: ${READABILITY_SERVICE_URL:-http://readability:3010}
      READABILITY_FALLBACK_ON_FAILURE: ${READABILITY_FALLBACK_ON_FAILURE:-true}
      VERIFY_SSL: ${VERIFY_SSL:-false}
      USER_AGENT: ${USER_AGENT:-searxng-mcp-search/0.1.0}
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: /mcp
      MCP_STATELESS_HTTP: "true"
    ports:
      - "${MCP_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  wikipedia-mcp:
    build:
      context: ./wikipedia_mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WIKIPEDIA_LANGUAGE: ${WIKIPEDIA_LANGUAGE:-en}
      WIKIPEDIA_ACCESS_TOKEN: ${WIKIPEDIA_ACCESS_TOKEN:-}
    ports:
      - "${WIKIPEDIA_MCP_PORT:-8001}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; sock = socket.create_connection(('127.0.0.1', 8080), 5); sock.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  searxng_cache:
